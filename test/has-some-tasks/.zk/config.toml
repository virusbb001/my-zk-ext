
[note]
template = "default.md"

[extra]

[format.markdown]
link-format = "wiki"
hashtags = true
colon-tags = true
multiword-tags = true

[tool]

[lsp.diagnostics]
dead-link = "error"

[lsp.completion]

[filter]

[alias]
task = "my-zk-ext task \"$@\""
project = "my-zk-ext project \"$@\""

[group.task]
paths = ["Projects/*"]

[group.task.note]
template = "tasks.md"

[group.project]
paths = ["Projects"]

[group.project.note]
filename = "{{slug title}}"
template = "tasks.md"
