
[note]
template = "default.md"

[extra]

[format.markdown]
link-format = "wiki"
hashtags = true
colon-tags = false
multiword-tags = false

[tool]

[lsp.diagnostics]
dead-link = "error"

[lsp.completion]

[filter]

[alias]
task = "my-zk-ext task \"$@\""
project = "my-zk-ext project \"$@\""
daily = "my-zk-ext daily \"$@\""
daily-new = "zk new --no-input \"$ZK_NOTEBOOK_DIR/Daily\" \"$@\""

[group.task]
paths = ["Projects/*"]

[group.task.note]
template = "tasks.md"

[group.project]
paths = ["Projects"]

[group.project.note]
filename = "{{slug title}}"
template = "tasks.md"

[group.daily]
paths = ["Daily"]

[group.daily.note]
filename = "{{ format-date now '%Y-%m-%d' }}"
extension = "md"
template = "daily.md"
